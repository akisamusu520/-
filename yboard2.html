<script type="module">
import { initializeApp } from "https://www.gstatic.com/firebasejs/10.12.0/firebase-app.js";
import { getDatabase, ref, set, update, onValue, remove, get } from "https://www.gstatic.com/firebasejs/10.12.0/firebase-database.js";

const firebaseConfig = {
  apiKey: "AIzaSyAAeLy_vD9PUHXZKprUTlRxoKSbMcoz3mc",
  authDomain: "yboard-26e09.firebaseapp.com",
  databaseURL: "https://yboard-26e09-default-rtdb.firebaseio.com",
  projectId: "yboard-26e09",
  storageBucket: "yboard-26e09.firebasestorage.app",
  messagingSenderId: "114601560655",
  appId: "1:114601560655:web:65ceb9f30d88551674f83a"
};

const app = initializeApp(firebaseConfig);
const db = getDatabase(app);

const $ = id => document.getElementById(id);
window.show=function(id){document.querySelectorAll('.screen').forEach(s=>s.classList.remove('active'));$(id).classList.add('active');window.scrollTo({top:0,behavior:'smooth'});}
function toast(msg){const el=$('toast');el.textContent=msg;el.classList.add('show');setTimeout(()=>el.classList.remove('show'),2500);}
function randCode(){return String(Math.floor(10+Math.random()*90));}

const COLORS=['#1a7a4a','#2d9e64','#48bb87','#6dcfa6','#94dfc0','#b8edda','#145e38','#0f4a2c','#3aaa72','#5cbf8e'];

let roomCode='';
let choiceCount=4;
let chartInst=null;
let isHost=false;
let guestName='';
let guestSelected=null;
let unsubscribe=null;
let scoreCache={};
let guestQuestionId=0;
let lastCorrectNum=null;
let guestMemberType='general'; // "general" or "new"
const answerSequence="1323413224"; // 10問の答え
let currentQuestion=0; // 現在の問題番号（0〜9）

// ===== HOST =====
window.goHost=function(){show('s-host-setup');};

window.changeCount=function(d){
  const el=$('choice-count');
  let v=Math.min(10,Math.max(1,parseInt(el.value)+d));
  el.value=v;$('count-preview').textContent=v;
};

window.hostOpenRoom=async function(){
  choiceCount=4;
  roomCode=randCode();
  isHost=true;

  // ルーム初期化
  await set(ref(db,'rooms/'+roomCode),{
    choiceCount:4,
    revealed:false,
    answers:{},
    guests:{}
  });

  $('run-room-code').textContent=roomCode;
  $('run-count').textContent=choiceCount;
  $('result-area').style.display='none';
  $('btn-area-run').style.display='flex';
  $('btn-area-next').style.display='none';

  // リスナー開始
  if(unsubscribe) unsubscribe();
  unsubscribe=onValue(ref(db,'rooms/'+roomCode),snap=>{
    const data=snap.val();
    if(!data) return;
    renderHostView(data);
  });

  // 復帰用にlocalStorageに保存
  currentQuestion=0;
  localStorage.setItem('yboard_host_room', roomCode);
  localStorage.setItem('yboard_host_count', choiceCount);
  show('s-host-run');
};

function renderHostView(data){
  const guests=data.guests||{};
  const answers=data.answers||{};
  const names=Object.keys(guests);
  const answered=Object.keys(answers).length;

  $('st-guests').textContent=names.length;
  $('st-answered').textContent=answered;

  // スコア表示（Firebaseデータから直接）
  renderScoreRankingFromData(data.scores||{}, data.members||{});

  // ゲスト一覧
  const el=$('guest-list');
  if(names.length===0){
    el.innerHTML='<p style="font-size:13px;color:var(--faint);text-align:center;padding:.5rem 0">ゲストを待っています…</p>';
    return;
  }
  el.innerHTML=names.map(n=>{
    const hasAns=answers[n]!==undefined;
    const badge=hasAns
      ?'<span class="badge badge-done">回答済み</span>'
      :'<span class="badge badge-wait">待機中</span>';
    return '<div class="guest-row"><span class="gname">'+n+'</span>'+badge+'</div>';
  }).join('');
}

window.hostRevealResult=function(){
  $('result-area').style.display='block';
  $('btn-area-run').style.display='none';
  $('btn-area-next').style.display='flex';
  get(ref(db,'rooms/'+roomCode)).then(snap=>{
    const data=snap.val()||{};
    const answers=data.answers||{};
    const count=4;
    renderChart(answers,count);
    renderRanking(answers,count);
    // 正解番号選択UI
    const grid=$('correct-num-grid');
    grid.innerHTML='';
    for(let i=1;i<=count;i++){
      const btn=document.createElement('button');
      btn.className='num-btn';
      btn.textContent=i;
      btn.onclick=()=>hostSelectCorrect(i);
      grid.appendChild(btn);
    }
    $('correct-area').style.display='block';
    $('correct-result-msg').textContent='';
    $('btn-undo-correct').style.display='none';
    lastCorrectNum=null;
  });
};

window.hostSelectCorrect=async function(num){
  // 最新データをFirebaseから取得
  const snap=await get(ref(db,'rooms/'+roomCode));
  const data=snap.val()||{};
  const answers=data.answers||{};
  // 正解者に+1
  const winners=Object.entries(answers).filter(e=>e[1]===num).map(e=>e[0]);
  const updates={};
  winners.forEach(name=>{
    scoreCache[name]=(scoreCache[name]||0)+1;
    updates['rooms/'+roomCode+'/scores/'+name]=scoreCache[name];
  });
  if(Object.keys(updates).length>0) await update(ref(db),updates);
  // 累計ランキング更新
  renderScoreRanking();
};

window.hostUndoCorrect=async function(){
  if(lastCorrectNum===null)return;
  const snap=await get(ref(db,'rooms/'+roomCode));
  const data=snap.val()||{};
  const answers=data.answers||{};
  // 前回の正解者から-1
  const winners=Object.entries(answers).filter(e=>e[1]===lastCorrectNum).map(e=>e[0]);
  const updates={};
  winners.forEach(name=>{
    const newScore=Math.max(0,(scoreCache[name]||1)-1);
    scoreCache[name]=newScore;
    updates['rooms/'+roomCode+'/scores/'+name]=newScore;
  });
  if(Object.keys(updates).length>0) await update(ref(db),updates);
  lastCorrectNum=null;
  $('btn-undo-correct').style.display='none';
  // ボタン強調リセット
  document.querySelectorAll('#correct-num-grid .num-btn').forEach(b=>b.classList.remove('selected'));
  $('correct-result-msg').textContent='取り消しました';
  renderScoreRanking();
};

function renderChart(answers,count){
  const votes=getVotes(answers,count);
  const labels=votes.map(v=>v.num+'番');
  const data=votes.map(v=>v.count);
  const total=data.reduce((a,b)=>a+b,0);
  if(chartInst)chartInst.destroy();
  const ctx=$('myChart').getContext('2d');
  chartInst=new Chart(ctx,{type:'bar',
    data:{labels,datasets:[{data,backgroundColor:COLORS.slice(0,count),borderRadius:6,borderSkipped:false}]},
    options:{responsive:true,maintainAspectRatio:false,
      plugins:{legend:{display:false},tooltip:{callbacks:{label:c=>{const pct=total>0?Math.round(c.raw/total*100):0;return c.raw+'人 ('+pct+'%)';}}}},
      scales:{y:{beginAtZero:true,ticks:{stepSize:1,color:'#4e7560'},grid:{color:'#d4e6db'}},x:{ticks:{color:'#4e7560'},grid:{display:false}}}}});
}

function renderRanking(answers,count){
  const votes=getVotes(answers,count);
  const total=votes.reduce((a,v)=>a+v.count,0);
  const sorted=votes.slice().sort((a,b)=>b.count-a.count);
  const medals=['🥇','🥈','🥉'];
  let rank=0,prevCount=-1;
  $('ranking-list').innerHTML=sorted.map((v,i)=>{
    if(v.count!==prevCount){rank=i+1;prevCount=v.count;}
    const pct=total>0?Math.round(v.count/total*100):0;
    const barW=total>0?(v.count/total*100):0;
    const medal=rank<=3&&v.count>0?medals[rank-1]:'';
    return '<div class="ranking-row">'+
      '<span class="rank-medal">'+medal+'</span>'+
      '<span class="rank-num">'+v.num+'番</span>'+
      '<div class="rank-bar-wrap"><div class="rank-bar" style="width:'+barW+'%;background:'+COLORS[(v.num-1)%COLORS.length]+'"></div></div>'+
      '<span class="rank-count">'+v.count+'人</span>'+
      '<span class="rank-pct">'+pct+'%</span>'+
    '</div>';
  }).join('');
}

function getVotes(answers,count){
  const votes=[];
  for(let i=1;i<=count;i++){
    const who=Object.entries(answers).filter(e=>e[1]===i).map(e=>e[0]);
    votes.push({num:i,count:who.length,names:who});
  }
  return votes;
}

function makeRankingHTML(sorted){
  if(sorted.length===0) return '<p style="color:var(--faint);font-size:13px;text-align:center;padding:.5rem 0">まだ点数がありません</p>';
  const medals=['🥇','🥈','🥉'];
  let rank=0,prevScore=-1;
  return sorted.map(([name,score],i)=>{
    if(score!==prevScore){rank=i+1;prevScore=score;}
    const medal=rank<=3&&score>0?medals[rank-1]:'';
    return '<div class="ranking-row" style="font-size:14px">'+
      '<span style="width:24px;text-align:center">'+medal+'</span>'+
      '<span style="flex:1;font-weight:600">'+name+'</span>'+
      '<span style="font-weight:700;color:var(--accent);font-size:16px">'+score+'点</span>'+
    '</div>';
  }).join('');
}

function renderScoreRankingFromData(scores, members){
  const el=$('score-ranking');
  if(!el)return;
  members=members||{};
  const allSorted=Object.entries(scores).sort((a,b)=>b[1]-a[1]);
  const newSorted=allSorted.filter(([n])=>members[n]==='new');
  el.innerHTML=
    '<div style="display:flex;gap:6px;margin-bottom:.75rem">'+
      '<button onclick="switchRankTab(&quot;all&quot;)" id="tab-all" style="flex:1;padding:6px;border-radius:8px;border:1.5px solid var(--accent);background:var(--accent);color:#fff;font-size:12px;font-weight:700;cursor:pointer;font-family:inherit">全体</button>'+
      '<button onclick="switchRankTab(&quot;new&quot;)" id="tab-new" style="flex:1;padding:6px;border-radius:8px;border:1.5px solid var(--border);background:#fff;color:var(--muted);font-size:12px;font-weight:700;cursor:pointer;font-family:inherit">新入会</button>'+
    '</div>'+
    '<div id="rank-tab-all">'+makeRankingHTML(allSorted)+'</div>'+
    '<div id="rank-tab-new" style="display:none">'+makeRankingHTML(newSorted)+'</div>';
}

window.switchRankTab=function(tab){
  $('rank-tab-all').style.display=tab==='all'?'block':'none';
  $('rank-tab-new').style.display=tab==='new'?'block':'none';
  const tabAll=$('tab-all'),tabNew=$('tab-new');
  if(tab==='all'){
    tabAll.style.background='var(--accent)';tabAll.style.color='#fff';tabAll.style.borderColor='var(--accent)';
    tabNew.style.background='#fff';tabNew.style.color='var(--muted)';tabNew.style.borderColor='var(--border)';
  } else {
    tabNew.style.background='var(--accent)';tabNew.style.color='#fff';tabNew.style.borderColor='var(--accent)';
    tabAll.style.background='#fff';tabAll.style.color='var(--muted)';tabAll.style.borderColor='var(--border)';
  }
};
function renderScoreRanking(){
  if(!roomCode)return;
  get(ref(db,'rooms/'+roomCode)).then(snap=>{
    const d=snap.val()||{};
    renderScoreRankingFromData(d.scores||{}, d.members||{});
  });
}

function makeFinalHTML(sorted){
  if(sorted.length===0) return '<p style="color:var(--faint);font-size:13px;text-align:center;padding:.5rem 0">スコアなし</p>';
  const medals=['🥇','🥈','🥉'];
  let rank=0,prevScore=-1;
  return sorted.map(([name,score],i)=>{
    if(score!==prevScore){rank=i+1;prevScore=score;}
    const medal=rank<=3&&score>0?medals[rank-1]:'';
    const isTop=rank===1&&score>0;
    return '<div class="ranking-row" style="font-size:'+(isTop?'17':'15')+'px;'+(isTop?'background:var(--accent-bg);border-radius:8px;padding:10px 8px;':'')+'">'+
      '<span style="width:30px;text-align:center;font-size:'+(isTop?'22':'16')+'px">'+medal+'</span>'+
      '<span style="flex:1;font-weight:'+(isTop?'800':'600')+'">'+name+'</span>'+
      '<span style="font-weight:700;color:var(--accent);font-size:'+(isTop?'20':'16')+'px">'+score+'点</span>'+
    '</div>';
  }).join('');
}

function renderFinalRankingFromScores(scores,elId,members){
  const el=$(elId);
  if(!el)return;
  members=members||{};
  const allSorted=Object.entries(scores).sort((a,b)=>b[1]-a[1]);
  const newSorted=allSorted.filter(([n])=>members[n]==='new');
  const uid=elId.replace('-','_');
  el.innerHTML=
    '<div style="display:flex;gap:6px;margin-bottom:.75rem">'+
      '<button onclick="switchFinalTab(&quot;all&quot;,&quot;'+uid+'&quot;)" id="ftab-all-'+uid+'" style="flex:1;padding:7px;border-radius:8px;border:1.5px solid var(--accent);background:var(--accent);color:#fff;font-size:13px;font-weight:700;cursor:pointer;font-family:inherit">全体ランキング</button>'+
      '<button onclick="switchFinalTab(&quot;new&quot;,&quot;'+uid+'&quot;)" id="ftab-new-'+uid+'" style="flex:1;padding:7px;border-radius:8px;border:1.5px solid var(--border);background:#fff;color:var(--muted);font-size:13px;font-weight:700;cursor:pointer;font-family:inherit">新入会ランキング</button>'+
    '</div>'+
    '<div id="ftab-all-content-'+uid+'">'+makeFinalHTML(allSorted)+'</div>'+
    '<div id="ftab-new-content-'+uid+'" style="display:none">'+makeFinalHTML(newSorted)+'</div>';
}

window.switchFinalTab=function(tab,uid){
  $('ftab-all-content-'+uid).style.display=tab==='all'?'block':'none';
  $('ftab-new-content-'+uid).style.display=tab==='new'?'block':'none';
  const a=$('ftab-all-'+uid),n=$('ftab-new-'+uid);
  if(tab==='all'){
    a.style.background='var(--accent)';a.style.color='#fff';a.style.borderColor='var(--accent)';
    n.style.background='#fff';n.style.color='var(--muted)';n.style.borderColor='var(--border)';
  } else {
    n.style.background='var(--accent)';n.style.color='#fff';n.style.borderColor='var(--accent)';
    a.style.background='#fff';a.style.color='var(--muted)';a.style.borderColor='var(--border)';
  }
};

function renderFinalRanking(elId){
  const el=$(elId);
  if(!el)return;
  const sorted=Object.entries(scoreCache).sort((a,b)=>b[1]-a[1]);
  if(sorted.length===0){
    el.innerHTML='<p style="color:var(--faint);font-size:13px;text-align:center">スコアなし</p>';
    return;
  }
  const medals=['🥇','🥈','🥉'];
  let rank=0,prevScore=-1;
  el.innerHTML=sorted.map(([name,score],i)=>{
    if(score!==prevScore){rank=i+1;prevScore=score;}
    const medal=rank<=3&&score>0?medals[rank-1]:'';
    const isTop=rank===1&&score>0;
    return '<div class="ranking-row" style="font-size:'+(isTop?'17':'15')+'px;'+(isTop?'background:var(--accent-bg);border-radius:8px;padding:10px 8px;':'')+'">'+
      '<span style="width:30px;text-align:center;font-size:'+(isTop?'22':'16')+'px">'+medal+'</span>'+
      '<span style="flex:1;font-weight:'+(isTop?'800':'600')+'">'+name+'</span>'+
      '<span style="font-weight:700;color:var(--accent);font-size:'+(isTop?'20':'16')+'px">'+score+'点</span>'+
    '</div>';
  }).join('');
}

window.hostNextQuestion=function(){
  $('next-count').value=choiceCount;
  $('next-count-preview').textContent=choiceCount;
  show('s-host-next');
};

window.changeNextCount=function(d){
  const el=$('next-count');
  let v=Math.min(10,Math.max(1,parseInt(el.value)+d));
  el.value=v;$('next-count-preview').textContent=v;
};

window.hostSendNext=async function(){
  choiceCount=4;
  currentQuestion++;
  const snap=await get(ref(db,'rooms/'+roomCode+'/questionId'));
  const currentId=(snap.val()||0);
  await update(ref(db,'rooms/'+roomCode),{choiceCount:4,answers:{},revealed:false,questionId:currentId+1});
  $('run-count').textContent=choiceCount;
  $('result-area').style.display='none';
  $('btn-area-run').style.display='flex';
  $('btn-area-next').style.display='none';
  if(chartInst){chartInst.destroy();chartInst=null;}
  show('s-host-run');
  toast('次の問題を送信しました');
};

window.hostEnd=async function(){
  toast('終了処理中…');
  localStorage.removeItem('yboard_host_room');
  localStorage.removeItem('yboard_host_count');
  localStorage.removeItem('yboard_guest_room');
  localStorage.removeItem('yboard_guest_name');
  if(unsubscribe){unsubscribe();unsubscribe=null;}
  try{
    const scSnap=await get(ref(db,'rooms/'+roomCode+'/scores'));
    const finalScores=scSnap.val()||{};
    const memSnap=await get(ref(db,'rooms/'+roomCode+'/members'));
    const finalMembers=memSnap.val()||{};
    await set(ref(db,'final/'+roomCode),{scores:finalScores,members:finalMembers,ts:Date.now()});
    await remove(ref(db,'rooms/'+roomCode));
    // 参加者と同じ画面に表示
    renderFinalRankingFromScores(finalScores,'guest-final-ranking',finalMembers);
  }catch(e){}
  show('s-guest-end');
};

// 終了ボタンにイベントリスナーを直接登録
document.addEventListener('DOMContentLoaded',function(){
  var b1=document.getElementById('btn-end-1');
  var b2=document.getElementById('btn-end-2');
  if(b1)b1.addEventListener('click',function(){window.hostEnd();});
  if(b2)b2.addEventListener('click',function(){window.hostEnd();});

  // 前回のゲストセッションが残っていれば復帰を提案
  const savedGuestRoom=localStorage.getItem('yboard_guest_room');
  const savedGuestName=localStorage.getItem('yboard_guest_name');
  if(savedGuestRoom&&savedGuestName){
    get(ref(db,'rooms/'+savedGuestRoom)).then(snap=>{
      if(!snap.exists()){
        localStorage.removeItem('yboard_guest_room');
        localStorage.removeItem('yboard_guest_name');
        return;
      }
      const banner=document.getElementById('resume-guest-banner');
      const nameEl=document.getElementById('resume-guest-name');
      const codeEl=document.getElementById('resume-guest-code');
      if(banner&&nameEl&&codeEl){
        nameEl.textContent=savedGuestName;
        codeEl.textContent=savedGuestRoom;
        banner.style.display='block';
      }
    });
  }

  // 前回のホストセッションが残っていれば復帰を提案
  const savedRoom=localStorage.getItem('yboard_host_room');
  if(savedRoom){
    get(ref(db,'rooms/'+savedRoom)).then(snap=>{
      if(!snap.exists()){
        // ルームが既に消えていたらクリア
        localStorage.removeItem('yboard_host_room');
        localStorage.removeItem('yboard_host_count');
        return;
      }
      // 復帰バナーを表示
      const banner=document.getElementById('resume-banner');
      const codeEl=document.getElementById('resume-code');
      if(banner&&codeEl){
        codeEl.textContent=savedRoom;
        banner.style.display='block';
      }
    });
  }
});

window.hostResume=async function(){
  const savedRoom=localStorage.getItem('yboard_host_room');
  const savedCount=4;
  if(!savedRoom)return;

  const snap=await get(ref(db,'rooms/'+savedRoom));
  if(!snap.exists()){
    toast('ルームがすでに終了しています');
    localStorage.removeItem('yboard_host_room');
    localStorage.removeItem('yboard_host_count');
    document.getElementById('resume-banner').style.display='none';
    return;
  }

  roomCode=savedRoom;
  choiceCount=savedCount;
  isHost=true;
  document.getElementById('resume-banner').style.display='none';

  $('run-room-code').textContent=roomCode;
  $('run-count').textContent=choiceCount;
  $('result-area').style.display='none';
  $('btn-area-run').style.display='flex';
  $('btn-area-next').style.display='none';

  if(unsubscribe)unsubscribe();
  unsubscribe=onValue(ref(db,'rooms/'+roomCode),snap=>{
    const data=snap.val();
    if(!data)return;
    renderHostView(data);
  });

  show('s-host-run');
  toast('ルーム '+roomCode+' に復帰しました');
};

window.hostReconnect=async function(){
  const code=$('reconnect-code').value.trim();
  if(code.length!==2){$('reconnect-code').focus();return toast('2桁のコードを入力してください');}

  const snap=await get(ref(db,'rooms/'+code));
  if(!snap.exists()){return toast('ルームが見つかりません。コードを確認してください');}

  const data=snap.val()||{};
  roomCode=code;
  choiceCount=4;
  isHost=true;

  localStorage.setItem('yboard_host_room',roomCode);
  localStorage.setItem('yboard_host_count',choiceCount);

  $('run-room-code').textContent=roomCode;
  $('run-count').textContent=choiceCount;
  $('result-area').style.display='none';
  $('btn-area-run').style.display='flex';
  $('btn-area-next').style.display='none';

  if(unsubscribe)unsubscribe();
  unsubscribe=onValue(ref(db,'rooms/'+roomCode),snap=>{
    const d=snap.val();
    if(!d)return;
    renderHostView(d);
  });

  show('s-host-run');
  toast('ルーム '+roomCode+' に再接続しました');
};

window.guestResume=async function(){
  const savedRoom=localStorage.getItem('yboard_guest_room');
  const savedName=localStorage.getItem('yboard_guest_name');
  if(!savedRoom||!savedName)return;

  const snap=await get(ref(db,'rooms/'+savedRoom));
  if(!snap.exists()){
    toast('ルームがすでに終了しています');
    localStorage.removeItem('yboard_guest_room');
    localStorage.removeItem('yboard_guest_name');
    document.getElementById('resume-guest-banner').style.display='none';
    return;
  }

  roomCode=savedRoom;
  guestName=savedName;
  guestSelected=null;
  isHost=false;
  document.getElementById('resume-guest-banner').style.display='none';

  const data=snap.val()||{};
  choiceCount=4;
  $('g-name-label').textContent=guestName;
  buildNumGrid(4);
  show('s-guest-answer');

  if(unsubscribe)unsubscribe();
  unsubscribe=onValue(ref(db,'rooms/'+roomCode),snap=>{
    const d=snap.val();
    if(!d){
      if(unsubscribe)unsubscribe();
      localStorage.removeItem('yboard_guest_room');
      localStorage.removeItem('yboard_guest_name');
      get(ref(db,'final/'+roomCode)).then(fsnap=>{
        const fd=fsnap.val()||{};
        renderFinalRankingFromScores(fd.scores||{},'guest-final-ranking',fd.members||{});
        show('s-guest-end');
      });
      return;
    }
    const newQId=d.questionId||0;
    if(newQId!==guestQuestionId){
      guestQuestionId=newQId;
      choiceCount=4;
      guestSelected=null;
      buildNumGrid(4);
      show('s-guest-answer');
      if(newQId>0) toast('次の問題です');
    }
  });
  toast(savedName+'として再接続しました');
};

window.guestResumeCancel=function(){
  localStorage.removeItem('yboard_guest_room');
  localStorage.removeItem('yboard_guest_name');
  document.getElementById('resume-guest-banner').style.display='none';
};

window.hostResumeCancel=function(){
  localStorage.removeItem('yboard_host_room');
  localStorage.removeItem('yboard_host_count');
  localStorage.removeItem('yboard_guest_room');
  localStorage.removeItem('yboard_guest_name');
  document.getElementById('resume-banner').style.display='none';
};

// ===== GUEST =====
window.goGuest=function(){show('s-guest-join');};

window.selectMember=function(type){
  guestMemberType=type;
  const btnGeneral=$('btn-member-general');
  const btnNew=$('btn-member-new');
  if(type==='general'){
    btnGeneral.style.background='var(--accent)';btnGeneral.style.color='#fff';btnGeneral.style.borderColor='var(--accent)';
    btnNew.style.background='#fff';btnNew.style.color='var(--muted)';btnNew.style.borderColor='var(--border)';
  } else {
    btnNew.style.background='var(--accent)';btnNew.style.color='#fff';btnNew.style.borderColor='var(--accent)';
    btnGeneral.style.background='#fff';btnGeneral.style.color='var(--muted)';btnGeneral.style.borderColor='var(--border)';
  }
};

window.guestJoin=async function(){
  const code=$('g-code').value.trim();
  const name=$('g-name').value.trim();
  if(code.length!==2){$('g-code').focus();return toast('2桁のコードを入力してください');}
  if(!name){$('g-name').focus();return toast('名前を入力してください');}

  $('g-join-btn').disabled=true;
  const statusEl=$('g-status-msg');
  statusEl.style.display='block';
  statusEl.textContent='接続中…';

  const snap=await get(ref(db,'rooms/'+code));
  if(!snap.exists()){
    $('g-join-btn').disabled=false;
    statusEl.style.display='none';
    return toast('ルームが見つかりません。コードを確認してください');
  }

  // 同じ名前が既に入室していたらはじく
  const roomData=snap.val()||{};
  const existingGuests=roomData.guests||{};
  if(Object.keys(existingGuests).includes(name)){
    $('g-join-btn').disabled=false;
    statusEl.style.display='none';
    return toast('その名前はすでに使われています。別の名前にしてください');
  }

  roomCode=code;
  guestName=name;
  guestSelected=null;
  isHost=false;

  // ゲスト登録（会員種別も保存）
  await update(ref(db,'rooms/'+roomCode+'/guests'),{[name]:true});
  await update(ref(db,'rooms/'+roomCode+'/members'),{[name]:guestMemberType});
  // 復帰用に保存
  localStorage.setItem('yboard_guest_room', roomCode);
  localStorage.setItem('yboard_guest_name', name);
  localStorage.setItem('yboard_guest_type', guestMemberType);

  $('g-join-btn').disabled=false;
  statusEl.style.display='none';

  // 現在の選択肢数で画面表示
  const data=snap.val();
  choiceCount=4;
  $('g-name-label').textContent=name;
  buildNumGrid(4);
  show('s-guest-answer');

  // 選択肢数の変更を監視
  if(unsubscribe)unsubscribe();
  unsubscribe=onValue(ref(db,'rooms/'+roomCode),snap=>{
    const data=snap.val();
    if(!data){
      // ルームが削除された＝終了
      if(unsubscribe)unsubscribe();
      // ゲスト用localStorageクリア
      localStorage.removeItem('yboard_guest_room');
      localStorage.removeItem('yboard_guest_name');
      // 最終スコアを取得して表示
      get(ref(db,'final/'+roomCode)).then(fsnap=>{
        const fd=fsnap.val()||{};
        const scores=fd.scores||{};
        Object.keys(scores).forEach(n=>scoreCache[n]=scores[n]);
        renderFinalRankingFromScores(scores,'guest-final-ranking',fd.members||{});
        show('s-guest-end');
      });
      return;
    }
    const newCount=data.choiceCount||4;
    const newQId=data.questionId||0;
    if(newQId!==guestQuestionId){
      guestQuestionId=newQId;
      choiceCount=newCount;
      guestSelected=null;
      buildNumGrid(4);
      show('s-guest-answer');
      if(newQId>0) toast('次の問題です');
    }
  });
};

function buildNumGrid(count){
  const grid=$('g-num-grid');
  grid.innerHTML='';
  for(let i=1;i<=count;i++){
    const btn=document.createElement('button');
    btn.className='num-btn';
    btn.textContent=i;
    btn.onclick=function(){
      grid.querySelectorAll('.num-btn').forEach(b=>b.classList.remove('selected'));
      btn.classList.add('selected');
      guestSelected=i;
      $('g-submit-btn').disabled=false;
    };
    grid.appendChild(btn);
  }
  guestSelected=null;
  $('g-submit-btn').disabled=true;
}

window.guestSubmit=async function(){
  if(guestSelected===null)return;
  await update(ref(db,'rooms/'+roomCode+'/answers'),{[guestName]:guestSelected});
  $('g-sent-num').textContent=guestSelected;
  show('s-guest-wait');
};

window.guestReAnswer=function(){
  buildNumGrid(4);
  show('s-guest-answer');
};

// ===== RESET =====
window.resetAll=function(){
  scoreCache={};
  localStorage.removeItem('yboard_host_room');
  localStorage.removeItem('yboard_host_count');
  localStorage.removeItem('yboard_guest_room');
  localStorage.removeItem('yboard_guest_name');
  // finalデータ削除（自分がホストだった場合）
  if(roomCode&&isHost){try{remove(ref(db,'final/'+roomCode));}catch(e){}}
  if(unsubscribe)unsubscribe();
  unsubscribe=null;
  roomCode='';choiceCount=4;guestName='';guestSelected=null;isHost=false;guestQuestionId=0;
  if(chartInst){chartInst.destroy();chartInst=null;}
  show('s-top');
};


</script>

<style>
*,*::before,*::after{box-sizing:border-box;margin:0;padding:0}
:root{
  --bg:#f2f7f4;--surface:#fff;--border:#d4e6db;--border-md:#aecfba;
  --text:#1a2e22;--muted:#4e7560;--faint:#8bab97;

  --success:#15803d;--success-bg:#f0fdf4;
  --danger:#b91c1c;--danger-bg:#fef2f2;
  --warn:#92400e;--warn-bg:#fffbeb;
  --r:10px;--rlg:16px;
}
body{font-family:'Hiragino Sans','Yu Gothic',sans-serif;background:var(--bg);color:var(--text);min-height:100vh;padding:1.5rem 1rem 5rem;display:flex;justify-content:center}
.app{width:100%;max-width:520px}
.screen{display:none}.screen.active{display:block}
.card{background:var(--surface);border:1px solid var(--border);border-radius:var(--rlg);padding:1.75rem;margin-bottom:1rem}
.btn{display:inline-flex;align-items:center;justify-content:center;gap:6px;padding:11px 18px;border:1.5px solid var(--border-md);border-radius:var(--r);background:var(--surface);color:var(--text);font-size:15px;font-weight:600;cursor:pointer;transition:all .12s;font-family:inherit;width:100%}
.btn:hover{background:var(--bg)}.btn:active{transform:scale(.98)}.btn:disabled{opacity:.4;cursor:not-allowed;transform:none}
.btn-primary{background:var(--accent);border-color:var(--accent);color:#fff;padding:13px}
.btn-primary:hover{background:var(--accent-dark);border-color:var(--accent-dark)}
.btn-back{width:auto;font-size:13px;color:var(--muted);border-color:var(--border);padding:7px 13px;margin-bottom:1.25rem}
.btn-danger{background:var(--danger-bg);border-color:var(--danger);color:var(--danger)}
.btn-row{display:flex;gap:10px}
.role-grid{display:grid;grid-template-columns:1fr 1fr;gap:12px;margin-top:.5rem}
.role-btn{padding:1.5rem 1rem;border:1.5px solid var(--border);border-radius:var(--r);background:var(--surface);cursor:pointer;text-align:center;transition:all .15s;color:var(--text);font-family:inherit}
.role-btn:hover{border-color:var(--accent);background:var(--accent-bg)}
.role-icon{font-size:30px;margin-bottom:10px}
.role-name{font-size:17px;font-weight:700}
input[type=text],input[type=number]{width:100%;padding:10px 13px;border:1.5px solid var(--border);border-radius:var(--r);font-size:15px;font-family:inherit;color:var(--text);background:var(--bg);outline:none;transition:border .15s}
input:focus{border-color:var(--accent);background:#fff}
.room-code-box{background:var(--accent-bg);border:1px solid var(--border-md);border-radius:var(--r);padding:1.25rem;text-align:center;margin-bottom:1rem}
.room-code{font-size:42px;font-weight:700;letter-spacing:8px;color:var(--accent);font-family:monospace}
.room-code-label{font-size:12px;color:var(--muted);margin-top:4px;font-weight:600}
.stat-row{display:grid;grid-template-columns:repeat(2,1fr);gap:10px;margin:1rem 0}
.stat-box{background:var(--bg);border:1px solid var(--border);border-radius:var(--r);padding:.75rem;text-align:center}
.stat-num{font-size:28px;font-weight:700;color:var(--text)}
.stat-label{font-size:11px;color:var(--muted);font-weight:600;letter-spacing:.05em;margin-top:2px}
.guest-row{display:flex;align-items:center;justify-content:space-between;padding:9px 0;border-bottom:1px solid var(--border)}
.guest-row:last-child{border-bottom:none}
.gname{font-size:14px;font-weight:600}
.badge{font-size:11px;font-weight:700;padding:3px 10px;border-radius:999px}
.badge-wait{background:var(--warn-bg);color:var(--warn)}
.badge-done{background:var(--success-bg);color:var(--success)}
.num-grid{display:grid;grid-template-columns:repeat(5,1fr);gap:8px;margin:1.25rem 0}
.num-btn{aspect-ratio:1;font-size:22px;font-weight:700;border:1.5px solid var(--border);border-radius:var(--r);background:var(--bg);color:var(--text);cursor:pointer;transition:all .12s;font-family:inherit}
.num-btn:hover{border-color:var(--accent);background:var(--accent-bg);color:var(--accent)}
.num-btn.selected{background:var(--accent);border-color:var(--accent);color:#fff}
.chart-wrap{position:relative;width:100%;height:260px;margin:1rem 0}
.stepper{display:flex;align-items:center;border:1.5px solid var(--border);border-radius:var(--r);overflow:hidden}
.stepper-btn{width:46px;height:46px;border:none;background:var(--bg);font-size:22px;cursor:pointer;font-family:inherit;color:var(--text);flex-shrink:0}
.stepper-btn:hover{background:var(--border-md)}
.stepper-val{flex:1;text-align:center;font-size:22px;font-weight:700;border:none;outline:none;background:var(--surface);font-family:inherit;color:var(--accent)}
.divider{border:none;border-top:1px solid var(--border);margin:1.25rem 0}
.dots{display:flex;justify-content:center;gap:7px;margin:1.5rem 0 1rem}
.dot{width:9px;height:9px;border-radius:50%;background:var(--border-md);animation:blink 1.2s infinite}
.dot:nth-child(2){animation-delay:.2s}.dot:nth-child(3){animation-delay:.4s}
@keyframes blink{0%,100%{opacity:.25;transform:scale(1)}50%{opacity:1;transform:scale(1.35)}}
.toast{position:fixed;bottom:1.5rem;left:50%;transform:translateX(-50%);background:#1a2e22;color:#fff;padding:10px 20px;border-radius:16px;font-size:14px;font-weight:600;opacity:0;transition:opacity .3s;pointer-events:none;white-space:normal;text-align:center;max-width:calc(100vw - 2rem);z-index:999}
.toast.show{opacity:1}
.ranking-row{display:flex;align-items:center;gap:10px;padding:9px 0;border-bottom:1px solid var(--border)}
.ranking-row:last-child{border-bottom:none}
.rank-medal{font-size:20px;min-width:28px;text-align:center}
.rank-num{font-size:20px;font-weight:700;color:var(--accent);min-width:40px}
.rank-bar-wrap{flex:1;height:12px;background:var(--bg);border-radius:999px;overflow:hidden}
.rank-bar{height:100%;border-radius:999px;transition:width .5s}
.rank-count{font-size:15px;font-weight:700;min-width:36px;text-align:right;color:var(--text)}
.rank-pct{font-size:12px;color:var(--faint);min-width:36px;text-align:right}
.top-header{text-align:center;padding:2rem 1rem 1.5rem}
.top-org{font-size:12px;font-weight:700;letter-spacing:.1em;color:var(--muted);margin-bottom:.35rem}
.top-title{font-size:28px;font-weight:900;color:var(--text);letter-spacing:.05em}
.top-sub{font-size:13px;color:var(--faint);margin-top:.35rem}
/* トップ画面 高級感デザイン */
#s-top{background:#fff;position:relative;overflow:hidden}
#s-top.active{display:block}
#s-top::before{content:'';position:absolute;top:-120px;right:-80px;width:400px;height:400px;border-radius:50%;background:radial-gradient(circle,rgba(26,122,74,.08) 0%,transparent 70%);pointer-events:none}
#s-top::after{content:'';position:absolute;bottom:-100px;left:-60px;width:320px;height:320px;border-radius:50%;background:radial-gradient(circle,rgba(26,122,74,.06) 0%,transparent 70%);pointer-events:none}
.top-inner{position:relative;z-index:1;padding:3.5rem 2rem 4rem;display:flex;flex-direction:column;align-items:center;gap:0}
.top-line{width:40px;height:2px;background:rgba(26,122,74,.2);margin-bottom:2rem}
.top-org-lux{font-size:16px;font-weight:700;letter-spacing:.1em;color:var(--muted);margin-bottom:1.25rem}
.top-title-lux{font-size:52px;font-weight:900;color:var(--text);letter-spacing:-.01em;line-height:1;margin-bottom:.6rem;text-align:center}
.top-sub-lux{font-size:12px;letter-spacing:.15em;color:var(--faint);margin-bottom:3.5rem;font-weight:500}
.top-btn-grid{display:flex;flex-direction:column;gap:14px;width:100%}
.top-role-btn{padding:1.4rem 1rem;border:1.5px solid var(--border);border-radius:16px;background:var(--bg);cursor:pointer;text-align:center;transition:all .2s;color:var(--text);font-family:inherit}

.top-role-icon{font-size:28px;margin-bottom:10px;display:block}
.top-role-name{font-size:16px;font-weight:700;letter-spacing:.05em;color:var(--text)}

</style>

<!-- HOST: 設定 -->
<div id="s-host-setup" class="screen">
  <button class="btn btn-back" onclick="show('s-top')">← 戻る</button>
<input type="hidden" id="choice-count" value="4">
  <button class="btn btn-primary" onclick="hostOpenRoom()">部屋を作る →</button>

  <!-- 再接続エリア -->
  <div style="margin-top:1.5rem;border-top:1px solid var(--border);padding-top:1.25rem">
    <p style="font-size:13px;font-weight:600;color:var(--muted);margin-bottom:.75rem">既存のルームに再接続</p>
    <div style="display:flex;gap:8px">
      <input type="text" id="reconnect-code" placeholder="コードを入力" maxlength="2" inputmode="numeric"
        style="font-size:22px;font-weight:700;letter-spacing:6px;text-align:center;flex:1;padding:10px;border:1.5px solid var(--border);border-radius:var(--r);outline:none;font-family:inherit">
      <button class="btn" style="width:auto;padding:10px 16px;font-size:14px" onclick="hostReconnect()">再接続</button>
    </div>
  </div>
</div>

<!-- HOST: 進行 -->
<div id="s-host-run" class="screen">
  <div class="card">
    <div class="room-code-box">
      <div class="room-code" id="run-room-code">----</div>
      <div class="room-code-label">ゲストに教えるコード（2桁）</div>
    </div>
    <div style="display:flex;align-items:center;justify-content:space-between;margin-bottom:.75rem">
      <span style="font-size:13px;font-weight:600;color:var(--muted)">選択肢の数</span>
      <span style="font-size:20px;font-weight:700;color:var(--accent)" id="run-count">4</span>
    </div>
    <div class="stat-row">
      <div class="stat-box"><div class="stat-num" id="st-guests">0</div><div class="stat-label">参加者</div></div>
      <div class="stat-box"><div class="stat-num" id="st-answered">0</div><div class="stat-label">回答済み</div></div>
    </div>
    <div class="divider"></div>
    <div id="result-area" style="display:none">
      <div class="chart-wrap"><canvas id="myChart"></canvas></div>
      <div class="divider"></div>
      <div id="ranking-list"></div>
      <div class="divider"></div>
      <div id="correct-area" style="display:none;pointer-events:none">
        <p style="font-size:13px;font-weight:600;color:var(--muted);margin-bottom:.5rem">正解番号を選ぶ</p>
        <div class="num-grid" id="correct-num-grid"></div>
        <div style="display:flex;align-items:center;gap:10px;margin-top:.5rem">
          <p id="correct-result-msg" style="font-size:13px;color:var(--accent);font-weight:600;flex:1;min-height:1.4em"></p>
          <button id="btn-undo-correct" style="display:none;font-size:12px;padding:5px 10px;border:1px solid var(--warn);background:var(--warn-bg);color:var(--warn);border-radius:6px;cursor:pointer;white-space:nowrap;pointer-events:none">↩ 取り消す</button>
        </div>
      </div>
      <div class="divider"></div>
    </div>
    <div style="margin-bottom:1rem">
      <p style="font-size:13px;font-weight:600;color:var(--muted);margin-bottom:.5rem">累計スコア</p>
      <div id="score-ranking"></div>
    </div>
    <div id="guest-list"></div>
  </div>
  <div id="btn-area-run" class="btn-row" style="display:flex">
    <button class="btn btn-primary" onclick="hostRevealResult()">結果発表 📊</button>
    <button id="btn-end-1" class="btn btn-danger" style="width:auto;padding:11px 18px">終了</button>
  </div>
  <div id="btn-area-next" class="btn-row" style="display:none">
    <button class="btn btn-primary" onclick="hostNextQuestion()">次の問題へ →</button>
    <button id="btn-end-2" class="btn btn-danger" style="width:auto;padding:11px 18px">終了</button>
  </div>
</div>

<!-- HOST: 次の問題 -->
<div id="s-host-next" class="screen">
  <input type="hidden" id="next-count" value="4">
  <span id="next-count-preview" style="display:none">4</span>
  <button class="btn btn-primary" onclick="hostSendNext()">次の問題へ送信 →</button>
</div>

<!-- GUEST: 参加 -->
<div id="s-guest-join" class="screen">
  <button class="btn btn-back" onclick="show('s-top')">← 戻る</button>
  <div class="card">
    <input type="text" id="g-code" placeholder="2桁のコード" maxlength="2" inputmode="numeric"
      style="font-size:28px;font-weight:700;letter-spacing:8px;text-align:center;margin-bottom:.75rem">
    <input type="text" id="g-name" placeholder="名前" maxlength="20">
    <div style="margin-top:.75rem">
      <p style="font-size:12px;color:var(--muted);margin-bottom:.4rem;font-weight:600">会員種別</p>
      <div style="display:flex;gap:8px">
        <button id="btn-member-general" onclick="selectMember('general')"
          style="flex:1;padding:10px;border:2px solid var(--accent);border-radius:10px;background:var(--accent);color:#fff;font-size:14px;font-weight:700;cursor:pointer;font-family:inherit">一般会員</button>
        <button id="btn-member-new" onclick="selectMember('new')"
          style="flex:1;padding:10px;border:2px solid var(--border);border-radius:10px;background:#fff;color:var(--muted);font-size:14px;font-weight:700;cursor:pointer;font-family:inherit">新入会会員</button>
      </div>
    </div>
    <button class="btn btn-primary" style="margin-top:1rem" id="g-join-btn" onclick="guestJoin()">参加する →</button>
    <p style="font-size:13px;text-align:center;margin-top:.75rem;color:var(--muted);display:none" id="g-status-msg"></p>
  </div>
</div>

<!-- GUEST: 回答 -->
<div id="s-guest-answer" class="screen">
  <div class="card">
    <p style="font-size:13px;color:var(--muted);margin-bottom:.25rem" id="g-name-label"></p>
    <div class="num-grid" id="g-num-grid"></div>
    <button class="btn btn-primary" id="g-submit-btn" onclick="guestSubmit()" disabled>送信する →</button>
  </div>
</div>

<!-- GUEST: 送信後 -->
<div id="s-guest-wait" class="screen">
  <div class="card" style="text-align:center;padding:2.5rem 1.75rem">
    <p style="font-size:14px;color:var(--muted);margin-bottom:.25rem">あなたの回答</p>
    <p style="font-size:56px;font-weight:700;color:var(--accent);margin:.25rem 0" id="g-sent-num"></p>
    <div class="dots"><div class="dot"></div><div class="dot"></div><div class="dot"></div></div>
    <p style="font-size:13px;color:var(--faint)">次の問題を待っています…</p>
    <button class="btn" style="margin-top:1.5rem;width:auto;padding:9px 20px" onclick="guestReAnswer()">回答しなおす</button>
  </div>
</div>

<!-- GUEST: 終了 -->
<div id="s-guest-end" class="screen">
  <div class="card">
    <p style="font-size:28px;text-align:center;margin:.5rem 0">🎉</p>
    <p style="font-size:16px;font-weight:700;text-align:center;margin-bottom:1rem">最終結果</p>
    <div id="guest-final-ranking"></div>
  </div>
  <button class="btn btn-primary" onclick="resetAll()">トップへ →</button>
</div>

<!-- 共通: 最終ランキング（主催者） -->
<div id="s-final" class="screen">
  <div class="card">
    <p style="font-size:28px;text-align:center;margin:.5rem 0">🏆</p>
    <p style="font-size:16px;font-weight:700;text-align:center;margin-bottom:1rem">最終結果</p>
    <div id="host-final-ranking"></div>
  </div>
  <button class="btn btn-primary" onclick="resetAll()">トップへ →</button>
</div>

<div class="toast" id="toast"></div>
</div>
</body>
</html>
