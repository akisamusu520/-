<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-status-bar-style" content="default">
<meta name="apple-mobile-web-app-title" content="除水計算">
<meta name="theme-color" content="#f5f7fa">
<title>除水計算</title>
<style>
  @import url('https://fonts.googleapis.com/css2?family=Noto+Sans+JP:wght@400;500;700&family=DM+Mono:wght@400;500&display=swap');
  *,*::before,*::after{box-sizing:border-box;margin:0;padding:0}
  :root{
    --bg:#f5f7fa;--bg2:#ffffff;--bg3:#f0f3f7;
    --border:#e4e9f0;--border2:#cdd5e0;
    --text:#1a2433;--text2:#4a5e74;--text3:#8a9db5;
    --accent:#1a6fcc;--accent-bg:#e8f1fb;
    --ok:#0e9e6a;--ok-bg:#e6f7f1;
    --warn:#c47f00;--warn-bg:#fef6e4;
    --danger:#cc2f2f;--danger-bg:#fdeaea;
    --mono:'DM Mono',monospace;--sans:'Noto Sans JP',sans-serif;
  }
  html,body{background:var(--bg);color:var(--text);font-family:var(--sans);-webkit-tap-highlight-color:transparent;overscroll-behavior:none;min-height:100dvh}
  body{padding:env(safe-area-inset-top) env(safe-area-inset-right) env(safe-area-inset-bottom) env(safe-area-inset-left)}
  .app{max-width:480px;margin:0 auto;padding:0 0 48px}
  header{padding:18px 20px 14px;border-bottom:1px solid var(--border);display:flex;align-items:center;gap:10px;position:sticky;top:0;background:var(--bg);z-index:10}
  .header-icon{width:34px;height:34px;background:var(--accent-bg);border-radius:9px;display:flex;align-items:center;justify-content:center;font-size:17px;flex-shrink:0}
  header h1{font-size:17px;font-weight:700}
  header p{font-size:11px;color:var(--text3);margin-top:1px}
  .section{margin:12px 14px 0;background:var(--bg2);border:1px solid var(--border);border-radius:14px;overflow:hidden}
  .section-title{font-size:11px;font-weight:700;letter-spacing:.07em;color:var(--text3);text-transform:uppercase;padding:10px 16px 8px;background:var(--bg3);border-bottom:1px solid var(--border)}
  .field{padding:13px 16px;border-bottom:1px solid var(--border);display:flex;align-items:center;gap:12px}
  .field:last-child{border-bottom:none}
  .field-label{flex:1;font-size:14px;color:var(--text);line-height:1.3}
  .field-label small{display:block;font-size:11px;color:var(--text3);margin-top:2px}
  .field-input{display:flex;align-items:center;gap:6px;flex-shrink:0}
  .field-input input{width:78px;background:var(--bg3);border:1px solid var(--border2);border-radius:8px;color:var(--text);font-family:var(--mono);font-size:16px;font-weight:500;text-align:right;padding:8px 10px;-webkit-appearance:none;outline:none;transition:border-color .15s,box-shadow .15s}
  .field-input input:focus{border-color:var(--accent);box-shadow:0 0 0 3px rgba(26,111,204,.1)}
  .field-input input.auto{border-color:var(--accent);background:var(--accent-bg)}
  .field-input .unit{font-size:13px;color:var(--text3);width:18px}
  .badge-diff{font-size:11px;padding:2px 7px;border-radius:20px;background:var(--warn-bg);color:var(--warn);font-family:var(--mono);display:none;flex-shrink:0;font-weight:500}
  .correction-header{padding:13px 16px;display:flex;align-items:center;gap:12px;cursor:pointer;background:var(--bg2)}
  .correction-header-text{flex:1}
  .correction-header-text .title{font-size:14px;color:var(--text)}
  .correction-header-text .sub{font-size:11px;color:var(--text3);margin-top:2px}
  .toggle-sw{width:44px;height:26px;background:var(--border2);border-radius:13px;position:relative;cursor:pointer;transition:background .2s;flex-shrink:0}
  .toggle-sw::after{content:'';position:absolute;width:20px;height:20px;background:white;border-radius:50%;top:3px;left:3px;transition:transform .2s;box-shadow:0 1px 3px rgba(0,0,0,.2)}
  .toggle-sw.on{background:var(--accent)}
  .toggle-sw.on::after{transform:translateX(18px)}
  .correction-body{display:none;padding:14px 16px;border-top:1px solid var(--border);background:var(--bg3)}
  .correction-body.open{display:block}
  .seg-ctrl{display:flex;background:var(--border);border-radius:9px;overflow:hidden;margin-bottom:14px;gap:1px}
  .seg-ctrl button{flex:1;background:var(--bg2);border:none;color:var(--text3);font-family:var(--sans);font-size:12px;padding:9px 6px;cursor:pointer;transition:background .15s,color .15s;line-height:1.4}
  .seg-ctrl button:first-child{border-radius:8px 0 0 8px}
  .seg-ctrl button:last-child{border-radius:0 8px 8px 0}
  .seg-ctrl button.active{background:var(--accent-bg);color:var(--accent);font-weight:700}
  .adj-row{display:flex;align-items:center;gap:12px}
  .adj-btn{width:42px;height:42px;background:var(--bg2);border:1px solid var(--border2);border-radius:10px;color:var(--text);font-size:20px;cursor:pointer;display:flex;align-items:center;justify-content:center;transition:background .1s;flex-shrink:0;-webkit-user-select:none;user-select:none}
  .adj-btn:active{background:var(--border)}
  .adj-display{flex:1;text-align:center;font-family:var(--mono);font-size:24px;font-weight:500;color:var(--text)}
  .adj-display span{font-size:13px;color:var(--text3);margin-left:3px}
  .corrected-pre{margin-top:10px;font-size:12px;color:var(--text3);text-align:center}
  .corrected-pre strong{color:var(--text2);font-family:var(--mono)}
  .results{margin:12px 14px 0;display:grid;grid-template-columns:1fr 1fr;gap:8px}
  .res-card{border-radius:14px;padding:18px 16px;background:var(--bg2);border:1px solid var(--border);transition:background .25s,border-color .25s}
  .res-card.ok{background:var(--ok-bg);border-color:#b2e4d2}
  .res-card.warn{background:var(--warn-bg);border-color:#f5d98a}
  .res-card.danger{background:var(--danger-bg);border-color:#f5b8b8}
  .res-sublabel{font-size:11px;color:var(--text3);margin-bottom:6px;line-height:1.4}
  .res-sublabel strong{color:var(--text2);font-weight:700}
  .res-num{font-family:var(--mono);font-size:40px;font-weight:500;line-height:1;color:var(--text2)}
  .res-num.ok{color:var(--ok)}
  .res-num.warn{color:var(--warn)}
  .res-num.danger{color:var(--danger)}
  .res-unit{font-size:12px;color:var(--text3);margin-top:4px}
  .reset-btn{display:block;width:calc(100% - 28px);margin:10px 14px 0;padding:13px;background:var(--bg2);border:1px solid var(--border2);border-radius:12px;color:var(--text3);font-family:var(--sans);font-size:14px;cursor:pointer;transition:background .15s}
  .reset-btn:active{background:var(--bg3)}
  .install-hint{margin:12px 14px 0;background:var(--accent-bg);border:1px solid #bcd6f5;border-radius:12px;padding:12px 14px;font-size:12px;color:var(--text2);line-height:1.6;display:none}
  .install-hint.show{display:block}
  .install-hint strong{color:var(--accent)}
</style>
</head>
<body>
<div class="app">
  <header>
    <div class="header-icon">💧</div>
    <div>
      <h1>除水計算</h1>
      <p>引き残し自動計算ツール</p>
    </div>
  </header>

  <div class="section">
    <div class="section-title">患者情報</div>
    <div class="field">
      <div class="field-label">DW（ドライウェイト）</div>
      <div class="field-input">
        <input type="number" id="dw" placeholder="0.0" step="0.1" inputmode="decimal">
        <span class="unit">kg</span>
      </div>
    </div>
    <div class="field">
      <div class="field-label">
        医師指示後体重
        <small>指定なし時はDWと同じ値</small>
      </div>
      <div class="field-input">
        <span class="badge-diff" id="diff_badge"></span>
        <input type="number" id="target_dw" placeholder="0.0" step="0.1" inputmode="decimal">
        <span class="unit">kg</span>
      </div>
    </div>
    <div class="field">
      <div class="field-label">【前】体重（透析前）</div>
      <div class="field-input">
        <input type="number" id="pre" placeholder="0.0" step="0.1" inputmode="decimal">
        <span class="unit">kg</span>
      </div>
    </div>
  </div>

  <div class="section">
    <div class="correction-header" onclick="toggleCorrection()">
      <div class="correction-header-text">
        <div class="title">体重の補正</div>
        <div class="sub">服・携帯など前体重に誤差があった場合</div>
      </div>
      <div class="toggle-sw" id="corr_toggle"></div>
    </div>
    <div class="correction-body" id="corr_body">
      <div class="seg-ctrl">
        <button class="active" id="btn_light" onclick="setSign(1)">軽かった（除水量を増やす）</button>
        <button id="btn_heavy" onclick="setSign(-1)">重かった（除水量を減らす）</button>
      </div>
      <div class="adj-row">
        <button class="adj-btn" onclick="stepExtra(-1)">−</button>
        <div class="adj-display"><span id="extra_val">0.1</span><span>kg</span></div>
        <button class="adj-btn" onclick="stepExtra(1)">＋</button>
      </div>
      <div class="corrected-pre">補正後の前体重：<strong id="pre_corrected">—</strong> kg <span id="correction_label"></span></div>
    </div>
  </div>

  <div class="section">
    <div class="section-title">除水量</div>
    <div class="field">
      <div class="field-label">
        除水量（リンス込み）
        <small id="rinse_hint"></small>
      </div>
      <div class="field-input">
        <input type="number" id="actual" step="0.1" inputmode="decimal" placeholder="0.0">
        <span class="unit">kg</span>
      </div>
    </div>
  </div>

  <div class="results" id="results_area">
    <div class="res-card" id="card_main" style="grid-column:1/-1">
      <div class="res-sublabel">引き残し</div>
      <div class="res-num" id="num_main">—</div>
      <div class="res-unit">kg</div>
    </div>
    <div class="res-card" id="card_true" style="display:none">
      <div class="res-sublabel">引き残し</div>
      <div class="res-num" id="num_main2">—</div>
      <div class="res-unit">kg</div>
    </div>
    <div class="res-card" id="card_corrected" style="display:none">
      <div class="res-sublabel"><strong>本来の</strong>引き残し</div>
      <div class="res-num" id="num_corrected">—</div>
      <div class="res-unit">kg</div>
    </div>
  </div>

  <button class="reset-btn" onclick="resetAll()">リセット</button>

  <div class="install-hint" id="install_hint">
    <strong>ホーム画面に追加する方法</strong><br>
    Safariの共有ボタン（□↑）をタップ →「ホーム画面に追加」を選択
  </div>
</div>
<script>
const RINSE=0.2;
let sign=1,extraKg=0.1,corrOn=false;
let userEditedActual=false; // 手動で除水量を変更したかどうか

function toggleCorrection(){corrOn=!corrOn;document.getElementById('corr_toggle').classList.toggle('on',corrOn);document.getElementById('corr_body').classList.toggle('open',corrOn);userEditedActual=false;calc()}
function setSign(val){sign=val;document.getElementById('btn_light').classList.toggle('active',val===1);document.getElementById('btn_heavy').classList.toggle('active',val===-1);userEditedActual=false;calc()}
function stepExtra(dir){extraKg=Math.round((extraKg+dir*0.1)*10)/10;if(extraKg<0.1)extraKg=0.1;document.getElementById('extra_val').textContent=extraKg.toFixed(1);userEditedActual=false;calc()}

function colorClass(val){if(val<-0.01)return'danger';if(Math.abs(val)<=0.01)return'ok';return'warn'}
function applyCard(cardEl,numEl,val){const cls=colorClass(val);cardEl.className='res-card '+cls;numEl.className='res-num '+cls;numEl.textContent=val.toFixed(1)}

// 自動計算される除水量（リンス込み）= 前体重 − 医師指示後体重 + 0.2
function calcAutoActual(pre, tdw){
  const raw = pre - tdw + RINSE;
  return Math.round(raw * 10) / 10;
}

function calc(){
  const dw     = parseFloat(document.getElementById('dw').value)||0;
  const tdw    = parseFloat(document.getElementById('target_dw').value)||0;
  const pre    = parseFloat(document.getElementById('pre').value)||0;
  const actualEl = document.getElementById('actual');

  // DW差分バッジ
  const diff=tdw-dw;
  const badge=document.getElementById('diff_badge');
  if(Math.abs(diff)>0.01){badge.textContent=(diff>0?'+':'')+diff.toFixed(1);badge.style.display='inline-block'}
  else{badge.style.display='none'}

  // 補正
  const correction=corrOn?sign*extraKg:0;
  const pre_c=pre+correction;
  document.getElementById('pre_corrected').textContent=pre_c.toFixed(1);
  document.getElementById('correction_label').textContent=
    correction!==0?((correction>0?'(+':'(')+correction.toFixed(1)+' kg)'):'';

  // 手動変更されていなければ除水量を自動セット（補正がオンなら補正後前体重で計算）
  if(!userEditedActual){
    const autoVal = Math.max(0, calcAutoActual(corrOn ? pre_c : pre, tdw));
    actualEl.value = autoVal.toFixed(1);
    actualEl.classList.add('auto');
  } else {
    actualEl.classList.remove('auto');
  }

  const actual = parseFloat(actualEl.value)||0;

  document.getElementById('rinse_hint').textContent=actual>0
    ?'リンス 0.2 kg を自動差し引き'
    :'除水なし・リンス 0.2 kg が体に入るだけ';

  // 実質除水量
  const net_raw=actual>0?actual-RINSE:-RINSE;
  const net_c=actual>0?actual-RINSE:-RINSE;

  // 引き残し = 透析後体重 − DW（医師指示後体重ではなくDW基準）
  // 透析後体重 = 前体重 − 実質除水量
  const post_raw=pre-net_raw;
  const residual_raw=post_raw-dw;

  const post_c=pre_c-net_c;
  const residual_c=post_c-dw;

  const cardMain=document.getElementById('card_main');
  const cardMain2=document.getElementById('card_true');
  const cardCorr=document.getElementById('card_corrected');
  const numMain=document.getElementById('num_main');
  const numMain2=document.getElementById('num_main2');
  const numCorr=document.getElementById('num_corrected');

  if(!corrOn){
    cardMain.style.gridColumn='1/-1';cardMain.style.display='';
    cardMain2.style.display='none';cardCorr.style.display='none';
    applyCard(cardMain,numMain,residual_raw);
  }else{
    cardMain.style.gridColumn='';cardMain.style.display='';
    cardMain2.style.display='none';cardCorr.style.display='';
    applyCard(cardMain,numMain,residual_raw);
    applyCard(cardCorr,numCorr,residual_c);
  }
}

// 患者情報の入力が変わったら自動計算リセット
['dw','target_dw','pre'].forEach(id=>{
  document.getElementById(id).addEventListener('input',()=>{
    userEditedActual=false;
    calc();
  });
});

// 除水量を手動で変えたらフラグを立てる
document.getElementById('actual').addEventListener('input',()=>{
  userEditedActual=true;
  calc();
});

function resetAll(){
  document.getElementById('dw').value='';
  document.getElementById('target_dw').value='';
  document.getElementById('pre').value='';
  userEditedActual=false;
  if(corrOn)toggleCorrection();
  sign=1;extraKg=0.1;
  document.getElementById('extra_val').textContent='0.1';
  document.getElementById('btn_light').classList.add('active');
  document.getElementById('btn_heavy').classList.remove('active');
  calc();
}

if(/iphone|ipad|ipod/i.test(navigator.userAgent)&&!window.navigator.standalone){
  document.getElementById('install_hint').classList.add('show');
}
calc();
</script>
</body>
</html>
